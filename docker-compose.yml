services:
  ke-ar-api:
    build: .
    container_name: ke-ar-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
